<svg  xmlns="http://www.w3.org/2000/svg"
      xmlns:xlink="http://www.w3.org/1999/xlink"
      width="2600"  height="1700"
      viewBox="0 0 130 85"
>
    <style>
        text {
            font: 5px Consolas;
        }
    </style>

    <!-- begin and end of polyline is not connected by stroke -->

    <!-- stroke-linecap=  "square"  "round"  "butt" (default)
         stroke-linejoin= "miter"   "round"  "bevel" -->
    <polyline points="10,10  125,25  50,50  25,30  75,5" 
        stroke="blueviolet"
        stroke-width="4"
        stroke-opacity="0.6"

        stroke-linecap="round"
        stroke-linejoin="round"

        fill="darkred"
        fill-opacity="0.75"
    />
    
    <text x="3" y="7" fill="blueviolet">round</text>
    <circle cx="10" cy="10" r="2"  stroke="black" stroke-width="0.1" fill="none"/>
    <circle cx="10" cy="10" r="0.2" />

    <text x="9" y="29" fill="blueviolet">round</text>
    <circle cx="25" cy="30" r="2"  stroke="black" stroke-width="0.1" fill="none"/>
    <circle cx="25" cy="30" r="0.2" />


    
    <polyline points="5,60  15,45  25,75" 
        stroke="blue"
        stroke-width="4"
        stroke-opacity="0.6"
        stroke-linecap="square"
        stroke-linejoin="miter"

        fill="yellowgreen"
        fill-opacity="0.75"
    />

    <text x="16" y="82" fill="blue">square</text>
    <circle cx="25" cy="75" r="2"  stroke="black" stroke-width="0.1" fill="none"/>
    <circle cx="25" cy="75" r="0.2" />
    <text x="10" y="40" fill="blue">miter</text>
    <circle cx="15" cy="45" r="2"  stroke="black" stroke-width="0.1" fill="none"/>
    <circle cx="15" cy="45" r="0.2" />



    <polyline points="35,50  40,70  50,55" 
        stroke="red"
        stroke-width="4"
        stroke-opacity="0.6"
        stroke-linecap="butt"
        stroke-linejoin="bevel"

        fill="aqua"
        fill-opacity="0.75"
    />

    <text x="52" y="58" fill="red">butt</text>
    <circle cx="50" cy="55" r="2"  stroke="black" stroke-width="0.1" fill="none"/>
    <circle cx="50" cy="55" r="0.2" />
    <text x="35" y="75" fill="red">bevel</text>
    <circle cx="40" cy="70" r="2"  stroke="black" stroke-width="0.1" fill="none"/>
    <circle cx="40" cy="70" r="0.2" />



    <!-- polygon element draws lines between all points,
         including a line from the last point back to the first. -->
    <polygon points="70,50  75,70  85,55" 
        stroke="burlywood"
        stroke-width="4"
        stroke-opacity="0.8"
        stroke-linejoin="bevel"

        fill="brown"
        fill-opacity="0.75"
    />
    <text x="88" y="55" fill="burlywood">polygon</text>
</svg>
