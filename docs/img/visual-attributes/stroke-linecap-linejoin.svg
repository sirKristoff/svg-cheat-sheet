<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="120"  height="340"
     style="background-color: white;"
>
    <defs>
        <g id="shape">
            <path d="m 0,0  l 10,60  l 20,-30"
                 stroke-width="12"  stroke-opacity="0.6" fill-opacity="0.75" />
            <circle cx= "0" cy= "0" r="6"  stroke="black" stroke-width="0.5" fill="none" />
            <circle cx= "0" cy= "0" r="1" />
            <circle cx="10" cy="60" r="6"  stroke="black" stroke-width="0.5" fill="none" />
            <circle cx="10" cy="60" r="1" />
        </g>
    </defs>

    <use xlink:href="#shape"
         x="10" y="10"
         stroke="burlywood" fill="brown"
    />
    <text x="10" y="10" dx="10" dy="5">butt (default)</text>
    <text x="20" y="60" dx="-10" dy="30">miter (default)</text>

    <use xlink:href="#shape"
         x="10" y="130"
         stroke="red" fill="aqua"
         stroke-linecap="square"
         stroke-linejoin="bevel"
    />
    <text x="10" y="130" dx="10" dy="5">square</text>
    <text x="20" y="180" dx="-10" dy="30">bevel</text>

    <use xlink:href="#shape"
         x="10" y="250"
         stroke="blue" fill="yellowgreen"
         stroke-linecap="round"
         stroke-linejoin="round"
    />
    <text x="10" y="250" dx="10" dy="5">round</text>
    <text x="20" y="300" dx="-10" dy="30">round</text>
</svg>