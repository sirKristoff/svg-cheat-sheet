<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="380"  height="270"
     style="background-color: white;"
>
    <defs>
        <g id="shapes">
            <path
                 stroke="black"  fill="none"
                 stroke-linejoin="miter"
                 d="M1,9 l7   ,-3 l7   ,3
                    m2,0 l3.5 ,-3 l3.5 ,3
                    m2,0 l2   ,-3 l2   ,3
                    m2,0 l0.75,-3 l0.75,3
                    m2,0 l0.5 ,-3 l0.5 ,3" />
            <path
                 stroke="pink"  fill="none"
                 stroke-width="0.05"
                 d="M1,9 l7   ,-3 l7   ,3
                    m2,0 l3.5 ,-3 l3.5 ,3
                    m2,0 l2   ,-3 l2   ,3
                    m2,0 l0.75,-3 l0.75,3
                    m2,0 l0.5 ,-3 l0.5 ,3" />
        </g>
    </defs>

    <use href="#shapes"  transform="translate(0,-20) scale(10)" />
    <use href="#shapes"  transform="translate(0, 60) scale(10)"
         stroke-miterlimit="1" />
    <use href="#shapes"  transform="translate(0,140) scale(10)"
         stroke-miterlimit="8" />
</svg>